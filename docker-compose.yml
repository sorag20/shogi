services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shogi-frontend
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://localhost:5001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - shogi-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shogi-backend
    ports:
      - "5001:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=mysql+pymysql://shogi_user:shogi_password@db:3306/shogi_db
      - AI_ENGINE_URL=http://ai-engine:8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - shogi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: mysql:8.0
    container_name: shogi-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=shogi_db
      - MYSQL_USER=shogi_user
      - MYSQL_PASSWORD=shogi_password
    volumes:
      - db-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - shogi-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:

networks:
  shogi-network:
    driver: bridge
